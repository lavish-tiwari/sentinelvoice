<!DOCTYPE html>
<html>
<head>
    <title>SentinelVoice</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            font-size: 40px;
        }

        #mode {
            margin: 20px;
            font-size: 18px;
            color: #22c55e;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 10px;
            background: #22c55e;
            border: none;
            cursor: pointer;
            margin: 10px;
        }

        #output {
            margin-top: 30px;
            font-size: 18px;
            white-space: pre-line;
        }
        
        .wave-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 80px;
            gap: 6px;
            margin-top: 20px;
        }

        .bar {
            width: 6px;
            height: 20px;
            background: #22c55e;
            animation: bounce 1s infinite ease-in-out;
        }

        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        .bar:nth-child(4) { animation-delay: 0.6s; }
        .bar:nth-child(5) { animation-delay: 0.8s; }

        @keyframes bounce {
            0%, 100% { height: 20px; }
            50% { height: 60px; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <h1>🎤 SentinelVoice</h1>

    <h3 id="mode">Mode: Assistant</h3>
    <button onclick="setMode('assistant')">🤖 Assistant</button>
    <button onclick="setMode('interview')">🎯 Interview</button>
    <button onclick="setLevel('beginner')">🟢 Beginner</button>
    <button onclick="setLevel('advanced')">🔴 Advanced</button>
    <button onclick="setMode('security')">🛡️ Security</button>

    <button onclick="startListening()">🎙️ Speak</button>
    <button onclick="fakeScam()">🛡️ Test Scam</button>

    <p id="output" style="
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    width:60%;
    margin:auto;
    "></p>

    <div id="wave" class="wave-container hidden">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    </div>

    <script src="/static/script.js"></script>

</body>
</html>
