<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SentinelVoice</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background:#0b1326; color:white; font-family:sans-serif; }
    .page { display:none; }
    .active { display:block; }
  </style>
</head>

<body>

<!-- ================= SIGNIN ================= -->
<div id="page-signin" class="active">
  <h2>Login</h2>
  <input id="loginEmail" placeholder="email"><br>
  <input id="loginPassword" placeholder="password"><br>
  <button onclick="performLogin()">Sign In</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="page-dashboard" class="page">
  <h1>🎤 SentinelVoice</h1>

  <div>
    <button onclick="setMode('assistant')">Assistant</button>
    <button onclick="setMode('interview')">Interview</button>
    <button onclick="setMode('security')">Security</button>
  </div>

  <!-- Interview Level -->
  <div id="levelControls" style="display:none;">
    <button onclick="setLevel('beginner')">Beginner</button>
    <button onclick="setLevel('advanced')">Advanced</button>
  </div>

  <br>

  <button onclick="startListening()">🎤 Speak</button>

  <div id="output" style="margin-top:20px;">
    AI response will appear here...
  </div>
</div>

<!-- ================= INTERVIEW ================= -->
<div id="page-interview" class="page">
  <h2>Interview Mode</h2>

  <div>
    <button onclick="setLevel('beginner')">🟢 Beginner</button>
    <button onclick="setLevel('advanced')">🔴 Advanced</button>
  </div>

  <button onclick="startListening()">🎤 Start Interview</button>
</div>

<!-- ================= SECURITY ================= -->
<div id="page-security" class="page">
  <h2>Security Mode</h2>
  <button onclick="startListening()">🎤 Scan Voice</button>
</div>

<script>

let currentMode = "assistant";
let interviewLevel = "beginner";
let isLoggedIn = false;

// ================= LOGIN =================
function performLogin() {
  isLoggedIn = true;
  showPage("dashboard");
}

// ================= PAGE SWITCH =================
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
}

// ================= MODE =================
function setMode(mode) {
  currentMode = mode;

  let levelControls = document.getElementById("levelControls");

  if (mode === "interview") {
    levelControls.style.display = "block";
  } else {
    levelControls.style.display = "none";
  }
}

// ================= LEVEL =================
function setLevel(level) {
  interviewLevel = level;

  document.getElementById("output").innerText =
    "Interview level set to " + level.toUpperCase();
}

// ================= VOICE =================
function startListening() {

  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    let text = event.results[0][0].transcript;

    let output = document.getElementById("output");
    output.innerText = "You: " + text + "\nAI: Thinking...";

    fetch("/process", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text: text,
        mode: currentMode,
        level: interviewLevel
      })
    })
    .then(res => res.json())
    .then(data => {
      let reply = data.response;

      output.innerText = "You: " + text + "\nAI: " + reply;

      if (data.audio) {
        let audio = new Audio(data.audio);
        audio.play();
      }
    });
  };

  recognition.start();
}

</script>

</body>
</html>
