<!DOCTYPE html>
<html>
<head>
    <title>SentinelVoice</title>

    <style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding-top: 40px;
}

/* Title */
h1 {
    font-size: 42px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

/* Mode Display */
#mode {
    margin: 15px;
    font-size: 16px;
    color: #22c55e;
    opacity: 0.9;
}

/* Buttons */
button {
    padding: 12px 22px;
    font-size: 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    border: none;
    cursor: pointer;
    margin: 8px;
    color: white;
    transition: all 0.25s ease;
    box-shadow: 0 0 10px rgba(34,197,94,0.3);
}

button:hover {
    transform: scale(1.07);
    box-shadow: 0 0 18px rgba(34,197,94,0.6);
}

/* Output Box (glass effect) */
#output {
    margin: 30px auto;
    font-size: 17px;
    white-space: pre-line;
    width: 65%;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

/* 🌊 Wave Bars (Improved) */
.wave-container {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 90px;
    gap: 8px;
    margin-top: 25px;
}

.bar {
    width: 8px;
    height: 25px;
    background: linear-gradient(180deg, #22c55e, #4ade80);
    border-radius: 4px;
    animation: bounce 1.2s infinite ease-in-out;
}

/* smoother wave timing */
.bar:nth-child(2) { animation-delay: 0.15s; }
.bar:nth-child(3) { animation-delay: 0.3s; }
.bar:nth-child(4) { animation-delay: 0.45s; }
.bar:nth-child(5) { animation-delay: 0.6s; }

/* smoother motion */
@keyframes bounce {
    0%, 100% { height: 20px; }
    50% { height: 70px; }
}

/* Hidden state */
.hidden {
    display: none;
}

.app-container {
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

/* group buttons nicely */
.controls {
    margin: 10px 0;
}
</style>
</head>
<body>

    <div class="app-container">

        <h1>🎤 SentinelVoice</h1>

        <h3 id="mode">Mode: Assistant</h3>

        <!-- Mode Controls -->
        <div class="controls">
            <button onclick="setMode('assistant')">🤖 Assistant</button>
            <button onclick="setMode('interview')">🎯 Interview</button>
            <button onclick="setMode('security')">🛡️ Security</button>
        </div>

        <!-- Interview Level (only meaningful in interview mode) -->
        <div class="controls">
            <button onclick="setLevel('beginner')">🟢 Beginner</button>
            <button onclick="setLevel('advanced')">🔴 Advanced</button>
        </div>

        <!-- Action Buttons -->
        <div class="controls">
            <button onclick="startListening()">🎙️ Speak</button>
            <button onclick="fakeScam()">🛡️ Test Scam</button>
        </div>

        <!-- Wave Visual -->
        <div id="wave-container" class="hidden">
            <canvas id="waveCanvas"></canvas>
        </div>

        <!-- Output -->
        <div id="output"></div>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
